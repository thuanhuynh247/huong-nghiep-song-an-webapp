<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huong Nghiep Song An | Không tìm thấy trang</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f1e7;
      --panel: rgba(255, 251, 245, 0.92);
      --line: rgba(27, 35, 42, 0.14);
      --text: #13232c;
      --muted: #625d59;
      --accent: #f1744d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Be Vietnam Pro", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(241, 116, 77, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.14), transparent 28%),
        var(--bg);
    }

    main {
      width: min(100%, 720px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      text-align: center;
      box-shadow: 0 24px 60px rgba(39, 30, 24, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 0.96;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 24px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #d65b33);
      color: #fff7f1;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Trang này không còn ở đây.</h1>
    <p>Quay về webapp Huong Nghiep Song An để tiếp tục làm bài, xem kết quả và khám phá các bộ trắc nghiệm hướng nghiệp.</p>
    <a href="./">Về trang chính</a>
  </main>
</body>
</html>

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp styles.css _site/
          cp script.js _site/
          cp assessment-data.js _site/
          cp manifest.webmanifest _site/
          cp app-icon.svg _site/
          cp icon-192.png _site/
          cp icon-512.png _site/
          cp apple-touch-icon.png _site/
          cp social-preview.png _site/
          cp social-preview.svg _site/
          cp sw.js _site/
          cp robots.txt _site/
          cp 404.html _site/
          cp privacy.html _site/
          cp sitemap.xml _site/
          cp .nojekyll _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
